<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zusatzstunden-Planer | Bildende Kunst</title>
    <!-- Tailwind CSS for high fidelity design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs (v18) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK Compat (perfect for single-file CDN setup) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* Smooth transitions for interactive elements */
        .interactive-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom scrollbar for beautiful student lists */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f5;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a3a3a3;
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-800 font-sans selection:bg-amber-100 selection:text-amber-900 pb-12">

    <!-- Root div for React Application -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CalendarIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>;
        const ClockIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const UserIcon = () => <svg className="w-4 h-4 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>;
        const LockIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>;
        const TrashIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;
        const PlusIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>;
        const QrIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>;
        const AlertIcon = () => <svg className="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>;
        const MapPinIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const CheckIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>;
        const LinkIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>;
        const CopyIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>;
        const SettingsIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;

        function App() {
            const [dbInstance, setDbInstance] = useState(null);
            const [isDemo, setIsDemo] = useState(true);
            const [slots, setSlots] = useState([]);
            
            // Firebase setup form
            const [showDbSetup, setShowDbSetup] = useState(false);
            const [fbApiKey, setFbApiKey] = useState('');
            const [fbProjectId, setFbProjectId] = useState('');

            // UI States
            const [isTeacher, setIsTeacher] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinCorrect, setPinCorrect] = useState(false);
            const [showQR, setShowQR] = useState(false);
            
            // Form-States (Lehrer)
            const [newDate, setNewDate] = useState('');
            const [newTime, setNewTime] = useState('');
            const [newRoom, setNewRoom] = useState('BK 1');
            const [customRoom, setCustomRoom] = useState('');
            
            // Form-States (Schüler)
            const [bookingSlot, setBookingSlot] = useState(null);
            const [studentName, setStudentName] = useState('');
            const [studentClass, setStudentClass] = useState('');
            const [missedCount, setMissedCount] = useState('1. Fehlstunde');
            const [acceptTerms, setAcceptTerms] = useState(false);

            // Toast Alerts
            const [notification, setNotification] = useState(null);

            const showToast = (message, type = 'info') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 5000);
            };

            useEffect(() => {
                const storedConfig = localStorage.getItem('bk_firebase_config');
                if (storedConfig) {
                    try {
                        const parsed = JSON.parse(storedConfig);
                        initializeFirebase(parsed);
                        setFbApiKey(parsed.apiKey || '');
                        setFbProjectId(parsed.projectId || '');
                    } catch (e) {
                        loadDemoData();
                    }
                } else {
                    loadDemoData();
                }
            }, []);

            useEffect(() => {
                if (isDemo) {
                    const localSlots = localStorage.getItem('bk_demo_slots');
                    if (localSlots) {
                        setSlots(JSON.parse(localSlots));
                    } else {
                        // Demo Initialisierung mit Standardräumen BK 1 und BK 2
                        const initialDemo = [
                            { id: '1', date: '2026-06-12', time: '13:30', room: 'BK 1', status: 'available', bookings: [] },
                            { id: '2', date: '2026-06-17', time: '15:00', room: 'BK 2', status: 'available', bookings: [] }
                        ];
                        setSlots(initialDemo);
                        localStorage.setItem('bk_demo_slots', JSON.stringify(initialDemo));
                    }
                } else if (dbInstance) {
                    // Firebase Live-Listener für lückenlose Synchronisierung
                    const unsubscribe = dbInstance.collection('slots').onSnapshot((snapshot) => {
                        const loaded = [];
                        snapshot.forEach(doc => {
                            loaded.push({ id: doc.id, ...doc.data() });
                        });
                        // Chronologisch nach Datum & Uhrzeit sortieren
                        loaded.sort((a, b) => `${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
                        setSlots(loaded);
                    }, (err) => {
                        showToast("Fehler bei Live-Datenbank: " + err.message, "error");
                    });
                    return () => unsubscribe();
                }
            }, [isDemo, dbInstance]);

            const initializeFirebase = (config) => {
                try {
                    // Verhindert doppelte Initialisierungsfehler im Browser
                    let app;
                    if (firebase.apps.length === 0) {
                        app = firebase.initializeApp(config);
                    } else {
                        app = firebase.app();
                    }
                    const db = app.firestore();
                    setDbInstance(db);
                    setIsDemo(false);
                    showToast("Live-Datenbank erfolgreich verbunden!", "success");
                } catch (err) {
                    console.error(err);
                    showToast("Verbindungsfehler. Nutze Demo-Modus.", "error");
                    loadDemoData();
                }
            };

            const loadDemoData = () => {
                setIsDemo(true);
                setDbInstance(null);
            };

            const saveDbSetup = (e) => {
                e.preventDefault();
                if (!fbApiKey || !fbProjectId) {
                    showToast("Bitte fülle alle Datenbankfelder aus.", "error");
                    return;
                }
                const customConfig = {
                    apiKey: fbApiKey.trim(),
                    authDomain: `${fbProjectId.trim()}.firebaseapp.com`,
                    projectId: fbProjectId.trim(),
                    storageBucket: `${fbProjectId.trim()}.appspot.com`,
                };
                localStorage.setItem('bk_firebase_config', JSON.stringify(customConfig));
                initializeFirebase(customConfig);
                setShowDbSetup(false);
            };

            const resetToDemo = () => {
                localStorage.removeItem('bk_firebase_config');
                loadDemoData();
                setShowDbSetup(false);
                showToast("Auf lokalen Demo-Modus zurückgesetzt.", "info");
            };

            // Lehrer Pin Freischaltung (Passwort: LaraCroft33)
            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (pinInput === 'LaraCroft33') {
                    setPinCorrect(true);
                    showToast("Erfolgreich eingeloggt.", "success");
                } else {
                    showToast("Falsches Passwort.", "error");
                }
            };

            const handleAddSlot = async (e) => {
                e.preventDefault();
                if (!newDate || !newTime) {
                    showToast("Bitte Datum und Uhrzeit angeben.", "error");
                    return;
                }
                const room = newRoom === 'Andere' ? customRoom : newRoom;
                if (!room) {
                    showToast("Bitte einen Raum angeben.", "error");
                    return;
                }

                const newSlotData = {
                    date: newDate,
                    time: newTime,
                    room: room,
                    status: 'available',
                    bookings: [] // Leere Gruppenbuchung vorbereitet
                };

                if (isDemo) {
                    const updated = [...slots, { id: Date.now().toString(), ...newSlotData }];
                    updated.sort((a, b) => `${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
                    setSlots(updated);
                    localStorage.setItem('bk_demo_slots', JSON.stringify(updated));
                    showToast("Termin lokal erstellt (Demo)!", "success");
                } else {
                    try {
                        await dbInstance.collection('slots').add(newSlotData);
                        showToast("Termin erfolgreich online gespeichert!", "success");
                    } catch (err) {
                        showToast("Fehler: " + err.message, "error");
                    }
                }
                setNewDate('');
                setNewTime('');
                setCustomRoom('');
            };

            // Termin komplett löschen
            const handleDeleteSlot = async (id) => {
                if (isDemo) {
                    const updated = slots.filter(s => s.id !== id);
                    setSlots(updated);
                    localStorage.setItem('bk_demo_slots', JSON.stringify(updated));
                    showToast("Termin gelöscht.", "success");
                } else {
                    try {
                        await dbInstance.collection('slots').doc(id).delete();
                        showToast("Termin online gelöscht.", "success");
                    } catch (err) {
                        showToast("Löschfehler: " + err.message, "error");
                    }
                }
            };

            const handleCancelBooking = async (slotId, bookingId) => {
                const slot = slots.find(s => s.id === slotId);
                if (!slot) return;
                const updatedBookings = (slot.bookings || []).filter(b => b.id !== bookingId);
                const isFull = updatedBookings.length >= 30;

                if (isDemo) {
                    const updated = slots.map(s => s.id === slotId ? { ...s, bookings: updatedBookings, status: isFull ? 'full' : 'available' } : s);
                    setSlots(updated);
                    localStorage.setItem('bk_demo_slots', JSON.stringify(updated));
                    showToast("Schüler ausgetragen.", "success");
                } else {
                    try {
                        await dbInstance.collection('slots').doc(slotId).update({
                            bookings: updatedBookings,
                            status: isFull ? 'full' : 'available'
                        });
                        showToast("Schüler erfolgreich ausgetragen.", "success");
                    } catch (err) {
                        showToast("Fehler: " + err.message, "error");
                    }
                }
            };

            const handleBookSlot = async (e) => {
                e.preventDefault();
                if (!studentName.trim() || !studentClass.trim()) {
                    showToast("Bitte fülle alle Felder aus.", "error");
                    return;
                }
                if (!acceptTerms) {
                    showToast("Du musst die Verbindlichkeits-Regel akzeptieren.", "error");
                    return;
                }

                const currentBookings = bookingSlot.bookings || [];
                if (currentBookings.length >= 30) {
                    showToast("Dieser Termin ist leider voll belegt!", "error");
                    setBookingSlot(null);
                    return;
                }

                // Generiere präzisen, minutengenauen Zeitstempel der Eintragung
                const now = new Date();
                const formattedTimestamp = now.toLocaleString('de-DE', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const newBooking = {
                    id: Math.random().toString(36).substring(2, 9),
                    studentName: studentName.trim(),
                    studentClass: studentClass.trim(),
                    missedCount: missedCount,
                    bookedAt: formattedTimestamp
                };

                const updatedBookings = [...currentBookings, newBooking];
                const isFull = updatedBookings.length >= 30;

                if (isDemo) {
                    const updated = slots.map(s => s.id === bookingSlot.id ? { ...s, bookings: updatedBookings, status: isFull ? 'full' : 'available' } : s);
                    setSlots(updated);
                    localStorage.setItem('bk_demo_slots', JSON.stringify(updated));
                    showToast("Verbindlich eingetragen!", "success");
                } else {
                    try {
                        await dbInstance.collection('slots').doc(bookingSlot.id).update({
                            bookings: updatedBookings,
                            status: isFull ? 'full' : 'available'
                        });
                        showToast("Erfolgreich für den Termin gebucht!", "success");
                    } catch (err) {
                        showToast("Buchungsfehler: " + err.message, "error");
                    }
                }

                setBookingSlot(null);
                setStudentName('');
                setStudentClass('');
                setAcceptTerms(false);
            };

            const currentUrl = window.location.href;
            const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=350x350&data=${encodeURIComponent(currentUrl)}`;

            const formatDate = (dateStr) => {
                const d = new Date(dateStr);
                return d.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
            };

            const copyToClipboard = () => {
                // Clipboard copy using textarea fallback as standard navigators are restricted in iframes
                const el = document.createElement('textarea');
                el.value = currentUrl;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Link in Zwischenablage kopiert!", "success");
            };

            return (
                <div className="min-h-screen pb-16">
                    {/* Top Demo Banner */}
                    {isDemo && (
                        <div className="bg-amber-600 text-white text-xs py-2 px-4 text-center font-semibold flex items-center justify-center gap-2">
                            <span>💡 Sie nutzen aktuell den Offline-Demo-Modus.</span>
                            <button onClick={() => setShowDbSetup(true)} className="underline font-bold hover:text-amber-100">
                                Jetzt Datenbank verknüpfen, damit Schüler buchen können
                            </button>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {notification && (
                        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-3 px-6 py-4 rounded-xl shadow-xl transition-all duration-300 ${
                            notification.type === 'success' ? 'bg-emerald-600 text-white' : 
                            notification.type === 'error' ? 'bg-rose-600 text-white' : 'bg-neutral-800 text-white'
                        }`}>
                            <span className="font-semibold text-sm">{notification.message}</span>
                            <button onClick={() => setNotification(null)} className="ml-2 font-bold">&times;</button>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-gradient-to-br from-neutral-900 via-neutral-800 to-amber-950 text-white shadow-md relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-amber-500 rounded-full filter blur-3xl opacity-10 -mr-20 -mt-20"></div>
                        <div className="max-w-4xl mx-auto px-4 py-8 relative z-10">
                            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                <div>
                                    <span className="bg-amber-500/20 text-amber-300 text-xs font-semibold tracking-wider uppercase px-3 py-1 rounded-full border border-amber-500/30">
                                        Kunsträume (BK 1 &amp; BK 2)
                                    </span>
                                    <h1 className="text-3xl font-extrabold tracking-tight mt-2 text-stone-100">
                                        Zusatzstunden-Planer
                                    </h1>
                                    <p className="text-stone-300 mt-2 text-sm max-w-xl">
                                        Verpasste BK-Stunden einfach &amp; transparent nachholen. Trage dich unten direkt in einen freien Termin ein.
                                    </p>
                                </div>
                                <button
                                    onClick={() => {
                                        setIsTeacher(!isTeacher);
                                        setPinCorrect(false);
                                    }}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all border ${
                                        isTeacher ? 'bg-amber-500 text-neutral-950 border-amber-400' : 'bg-neutral-800 hover:bg-neutral-700 text-stone-200'
                                    }`}
                                >
                                    {isTeacher ? "Zur Schüler-Ansicht" : "Lehrer-Bereich"}
                                </button>
                            </div>
                        </div>
                    </header>

                    {}
                    <main className="max-w-4xl mx-auto px-4 mt-8">
                        
                        {/* DATABASE SETUP MODAL */}
                        {showDbSetup && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl relative">
                                    <button onClick={() => setShowDbSetup(false)} className="absolute top-4 right-4 text-2xl font-bold text-neutral-400">&times;</button>
                                    <h3 className="text-xl font-bold text-neutral-900 mb-2">Datenbank verbinden</h3>
                                    <p className="text-xs text-neutral-500 mb-6 leading-relaxed">
                                        Erstellen Sie ein kostenloses Firebase-Konto bei Google, kopieren Sie Ihre Schlüssel hierher, damit Ihre Schüler live Termine buchen können.
                                    </p>
                                    <form onSubmit={saveDbSetup} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-neutral-500 uppercase mb-1">API Key</label>
                                            <input type="text" value={fbApiKey} onChange={(e) => setFbApiKey(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-neutral-500 uppercase mb-1">Project ID</label>
                                            <input type="text" value={fbProjectId} onChange={(e) => setFbProjectId(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" required />
                                        </div>
                                        <div className="flex gap-2 pt-2">
                                            <button type="submit" className="flex-1 bg-neutral-900 text-white py-2.5 rounded-xl text-xs font-semibold">Speichern</button>
                                            <button type="button" onClick={resetToDemo} className="flex-1 bg-rose-50 text-rose-600 py-2.5 rounded-xl text-xs font-semibold">Demo zurücksetzen</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* TEACHER DASHBOARD QUICK ACTIONS */}
                        {isTeacher && pinCorrect && (
                            <div className="mb-6 bg-white border rounded-3xl p-6 shadow-sm space-y-6">
                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b pb-4">
                                    <div>
                                        <h3 className="text-lg font-bold text-neutral-900 flex items-center gap-2"><SettingsIcon /> Lehrer-Verwaltung</h3>
                                        <p className="text-xs text-neutral-500">Termine erstellen &amp; Schüler-Eintragungen einsehen.</p>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={() => setShowDbSetup(true)} className="bg-neutral-100 text-neutral-700 px-3 py-1.5 rounded-xl text-xs font-semibold hover:bg-neutral-200">Datenbank einstellen</button>
                                        <button onClick={() => setShowQR(true)} className="bg-amber-500 text-neutral-950 px-3 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1.5"><QrIcon /> QR-Code anzeigen</button>
                                    </div>
                                </div>
                                <div className="bg-neutral-50 p-3 rounded-xl border flex items-center justify-between text-xs font-mono">
                                    <span className="truncate mr-4"><strong>Link für SuS:</strong> {currentUrl}</span>
                                    <button onClick={copyToClipboard} className="shrink-0 flex items-center gap-1 bg-white hover:bg-neutral-100 text-neutral-700 px-3 py-1.5 rounded-lg border font-sans text-xs font-bold"><CopyIcon /> Kopieren</button>
                                </div>
                            </div>
                        )}

                        {/* QR CODE DIALOG */}
                        {showQR && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative">
                                    <button onClick={() => setShowQR(false)} className="absolute top-4 right-4 text-neutral-400 text-2xl font-bold">&times;</button>
                                    <h3 className="text-lg font-bold text-neutral-950 mb-1">QR-Code scannen</h3>
                                    <p className="text-xs text-neutral-500 mb-6">SuS halten einfach ihre Handykamera auf diesen Code.</p>
                                    <div className="bg-neutral-50 p-4 rounded-2xl inline-block border mb-6"><img src={qrCodeUrl} className="w-56 h-56 mx-auto" /></div>
                                    <button onClick={copyToClipboard} className="w-full bg-neutral-900 text-white text-xs font-bold py-2.5 rounded-xl flex items-center justify-center gap-2"><LinkIcon /> Link kopieren</button>
                                </div>
                            </div>
                        )}

                        {/* PIN AUTH VIEW */}
                        {isTeacher && !pinCorrect && (
                            <div className="bg-white border rounded-3xl p-8 shadow-sm max-w-md mx-auto text-center">
                                <div className="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4 text-amber-700"><LockIcon /></div>
                                <h2 className="text-xl font-bold text-neutral-900 mb-2">Lehrer-Bereich freischalten</h2>
                                <p className="text-sm text-neutral-600 mb-6">Bitte geben Sie Ihr Passwort ein (LaraCroft33).</p>
                                <form onSubmit={handlePinSubmit} className="space-y-4">
                                    <input type="password" placeholder="Passwort eingeben" value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="w-full text-center tracking-widest text-lg px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-amber-500" required />
                                    <button type="submit" className="w-full bg-neutral-900 text-white font-medium py-3 rounded-xl hover:bg-neutral-800">Anmelden</button>
                                </form>
                            </div>
                        )}

                        {}
                        {isTeacher && pinCorrect && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white border rounded-3xl p-6 shadow-sm h-fit">
                                    <h2 className="text-base font-bold text-neutral-950 mb-4 flex items-center gap-2"><PlusIcon /> Termin hinzufügen</h2>
                                    <form onSubmit={handleAddSlot} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-neutral-500 mb-1">Datum</label>
                                            <input type="date" value={newDate} onChange={(e) => setNewDate(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-neutral-500 mb-1">Uhrzeit</label>
                                            <input type="time" value={newTime} onChange={(e) => setNewTime(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-neutral-500 mb-1">Kunstraum</label>
                                            <select value={newRoom} onChange={(e) => setNewRoom(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm bg-white">
                                                <option value="BK 1">BK 1</option>
                                                <option value="BK 2">BK 2</option>
                                                <option value="Andere">Anderer Ort...</option>
                                            </select>
                                        </div>
                                        {newRoom === 'Andere' && (
                                            <div>
                                                <label className="block text-xs font-semibold text-neutral-500 mb-1">Ortbezeichnung</label>
                                                <input type="text" placeholder="z.B. Werkraum" value={customRoom} onChange={(e) => setCustomRoom(e.target.value)} className="w-full px-3 py-2 border rounded-xl text-sm" required />
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-amber-500 hover:bg-amber-600 text-neutral-950 font-bold py-2.5 rounded-xl text-sm shadow-sm flex items-center justify-center gap-2">Termin freischalten</button>
                                    </form>
                                </div>

                                <div className="md:col-span-2 bg-white border rounded-3xl p-6 shadow-sm">
                                    <h2 className="text-lg font-bold text-neutral-950 mb-6">Zusatztermine ({slots.length})</h2>
                                    {slots.length === 0 ? (
                                        <div className="text-center py-12 border-2 border-dashed rounded-2xl text-neutral-400">Keine Termine angelegt.</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {slots.map((slot) => {
                                                const bookings = slot.bookings || [];
                                                return (
                                                    <div key={slot.id} className="p-4 rounded-2xl border bg-neutral-50">
                                                        <div className="flex justify-between items-start border-b pb-3 flex-wrap gap-2">
                                                            <div>
                                                                <div className="flex items-center gap-2 flex-wrap">
                                                                    <span className="font-bold">{formatDate(slot.date)}</span>
                                                                    <span className="bg-white border px-2 py-0.5 rounded-full text-xs font-semibold flex items-center gap-1 text-neutral-600"><ClockIcon /> {slot.time} Uhr</span>
                                                                </div>
                                                                <div className="text-xs text-neutral-500 mt-1 flex items-center gap-1.5"><MapPinIcon /> {slot.room}</div>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-xs font-bold px-2 py-1 bg-white rounded-lg border">{bookings.length} / 30 Belegt</span>
                                                                <button onClick={() => handleDeleteSlot(slot.id)} className="text-rose-600 hover:bg-rose-100 p-2 rounded-lg transition"><TrashIcon /></button>
                                                            </div>
                                                        </div>
                                                        <div className="mt-3">
                                                            {bookings.length === 0 ? (
                                                                <p className="text-xs text-neutral-400 italic">Noch keine Schüler angemeldet.</p>
                                                            ) : (
                                                                <div className="space-y-1.5">
                                                                    {bookings.map((b) => (
                                                                        <div key={b.id} className="bg-white border p-2 rounded-xl flex items-center justify-between text-xs">
                                                                            <div>
                                                                                <div className="font-semibold">{b.studentName} ({b.studentClass})</div>
                                                                                <div className="text-[10px] text-neutral-400 mt-0.5">{b.missedCount} • Eingetragen: {b.bookedAt}</div>
                                                                            </div>
                                                                            <button onClick={() => handleCancelBooking(slot.id, b.id)} className="text-[10px] text-rose-600 bg-rose-50 px-2 py-1 rounded-lg hover:bg-rose-100">Austragen</button>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {}
                        {!isTeacher && (
                            <div className="space-y-6">
                                <div className="bg-amber-50 border border-amber-200 rounded-3xl p-6 shadow-sm">
                                    <div className="flex items-start gap-4">
                                        <div className="p-2 bg-amber-100 rounded-2xl text-amber-800 shrink-0"><AlertIcon /></div>
                                        <div className="space-y-1">
                                            <h2 className="text-base font-bold text-neutral-950">Wichtig: Die Verbindlichkeits-Regel!</h2>
                                            <p className="text-xs sm:text-sm text-neutral-700 leading-relaxed">
                                                Fehlzeiten im Kunstunterricht müssen praktisch nachgeholt werden. Wenn du dich einträgst und unentschuldigt nicht in BK 1 oder BK 2 erscheinst, verfällt deine Zusatzstunde und dein Nachholanspruch!
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white border rounded-3xl p-6 shadow-sm">
                                    <h2 className="text-lg font-bold text-neutral-950 mb-5">Verfügbare Nachholtermine</h2>
                                    {slots.length === 0 ? (
                                        <div className="text-center py-16 text-neutral-400">Aktuell sind keine Zusatztermine eingetragen. Frag bitte direkt bei der Lehrkraft nach.</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {slots.map((slot) => {
                                                const bookings = slot.bookings || [];
                                                const isFull = bookings.length >= 30;
                                                const freePlaces = 30 - bookings.length;
                                                return (
                                                    <div key={slot.id} className={`p-4 rounded-2xl border transition-all ${isFull ? 'bg-neutral-50 opacity-60 cursor-not-allowed' : 'bg-white hover:border-amber-400 hover:shadow-sm cursor-pointer'}`} onClick={() => !isFull && setBookingSlot(slot)}>
                                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                            <div>
                                                                <div className="flex items-center gap-2 flex-wrap">
                                                                    <span className="font-bold text-neutral-950 text-base">{formatDate(slot.date)}</span>
                                                                    <span className="bg-neutral-100 px-2.5 py-0.5 rounded-full text-xs font-semibold flex items-center gap-1 border"><ClockIcon /> {slot.time} Uhr</span>
                                                                </div>
                                                                <div className="text-xs text-neutral-500 mt-1 flex items-center gap-1.5"><MapPinIcon /> {slot.room}</div>
                                                            </div>
                                                            <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto">
                                                                <span className="text-xs text-neutral-500">{isFull ? "Ausgebucht" : `${freePlaces} von 30 Plätzen frei`}</span>
                                                                {isFull ? <span className="text-xs font-bold uppercase tracking-wider bg-neutral-200 text-neutral-500 px-3 py-1.5 rounded-xl">Belegt</span> : <button onClick={() => setBookingSlot(slot)} className="bg-amber-500 hover:bg-amber-600 text-neutral-950 font-bold px-4 py-2 rounded-xl text-xs transition-all shadow-sm">Termin wählen</button>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {}
                        {bookingSlot && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-3xl p-6 sm:p-8 max-w-md w-full shadow-2xl relative max-h-[90vh] overflow-y-auto">
                                    <button onClick={() => { setBookingSlot(null); setAcceptTerms(false); }} className="absolute top-4 right-4 text-neutral-400 hover:text-neutral-700 text-2xl font-bold">&times;</button>
                                    <div className="text-amber-600 mb-1 font-bold uppercase tracking-wider text-[10px]">Schritt 2: Anmeldung abschließen</div>
                                    <h3 className="text-lg font-bold text-neutral-950 mb-4">Verbindlich eintragen</h3>
                                    
                                    <div className="bg-amber-50 border border-amber-200 p-4 rounded-2xl mb-5 space-y-1">
                                        <div className="text-[10px] text-amber-800 font-bold uppercase tracking-wide">Dein Termin:</div>
                                        <div className="font-bold text-neutral-900 text-sm">{formatDate(bookingSlot.date)}</div>
                                        <div className="text-xs text-neutral-700 flex items-center gap-2">
                                            <span><strong>Uhrzeit:</strong> {bookingSlot.time} Uhr</span>
                                            <span>•</span>
                                            <span><strong>Raum:</strong> {bookingSlot.room}</span>
                                        </div>
                                    </div>

                                    <form onSubmit={handleBookSlot} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-neutral-500 mb-1">Dein Vor- und Nachname</label>
                                            <input type="text" placeholder="z.B. Tim Becker" value={studentName} onChange={(e) => setStudentName(e.target.value)} className="w-full px-4 py-3 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-amber-500" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-neutral-500 mb-1">Deine Klasse / Kurs</label>
                                            <input type="text" placeholder="z.B. 10a" value={studentClass} onChange={(e) => setStudentClass(e.target.value)} className="w-full px-4 py-3 rounded-xl border text-sm outline-none focus:ring-2 focus:ring-amber-500" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-neutral-500 mb-1">Wie oft hast du gefehlt?</label>
                                            <select value={missedCount} onChange={(e) => setMissedCount(e.target.value)} className="w-full px-4 py-3 border rounded-xl text-sm bg-white outline-none focus:ring-2 focus:ring-amber-500">
                                                <option value="1. Fehlstunde">1. Fehlstunde in diesem Projekt</option>
                                                <option value="2. Fehlstunde">2. Fehlstunde in diesem Projekt</option>
                                                <option value="3. Fehlstunde oder mehr">3. oder weitere Fehlstunde</option>
                                            </select>
                                        </div>
                                        <div className="pt-2">
                                            <label className="flex items-start gap-3 cursor-pointer select-none">
                                                <input type="checkbox" checked={acceptTerms} onChange={(e) => setAcceptTerms(e.target.checked)} className="mt-1 w-4 h-4 text-amber-600 border-neutral-300 rounded focus:ring-amber-500" />
                                                <span className="text-xs text-neutral-600 leading-tight">Ich verspreche, zu dem Termin zu erscheinen. Unentschuldigtes Fehlen lässt meine Zusatzstunde verfallen.</span>
                                            </label>
                                        </div>
                                        <div className="flex gap-3 pt-4 border-t">
                                            <button type="button" onClick={() => { setBookingSlot(null); setAcceptTerms(false); }} className="flex-1 bg-neutral-100 text-neutral-700 font-semibold py-3 rounded-xl text-sm hover:bg-neutral-200">Abbrechen</button>
                                            <button type="submit" className="flex-1 bg-amber-500 hover:bg-amber-600 text-neutral-950 font-bold py-3 rounded-xl text-sm shadow-md">Verbindlich Buchen</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                    </main>

                    <footer className="max-w-4xl mx-auto px-4 mt-16 pt-6 border-t border-neutral-200 text-center text-xs text-neutral-500">
                        <p>© 2026 Zusatzstunden-Planer • Bildende Kunst (Untergeschoss)</p>
                    </footer>
                </div>
            );
        }

        // Render React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
